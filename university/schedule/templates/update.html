{% extends 'base.html' %}

{% block title %}{{ title }}{% endblock %}

{% block header %}{{ title }}{% endblock %}

{% block content %}
<hl>Обновить информацию о преподавателе {{ teacher.first_name}} {{teacher.last_name}}</hl>
<form method="post">
  {% csrf_token %}

  <label>
    Имя:
    <input type="text" name="first_name" required>
  </label>
  <br><br>

  <label>
    Фамилия:
    <input type="text" name="last_name" required>
  </label>
  <br><br>

  <label>
    Почта:
    <input type="text" name="email" required>
  </label>
  <br><br>

  <label>
    Кафедра:
    <input type="text" name="departament" required>
  </label>
  <br><br>

  <label>
    Контактный телефон:
    <input type="text" name="phone_number" required>
  </label>
  <br><br>

  <label>
    Статус (1 - активен, 0 - заблокирован):
    <input type="boolean" name="is_active" required>
  </label>
  <br><br>

  <button type="submit">Обновить</button>

  <form method="post" action="{%url 'delete' teacher.id %}">
    {% csrf_token %}
    <button type="submit">Удалить</button>
  </form>
</form>
{% endblock %}
