{% extends 'base.html' %}

{% block title %}{{ title }}{% endblock %}

{% block header %}{{ title }}{% endblock %}

{% block content %}
<hl>Добавить преподавателя</hl>
{% if form.errors %}
    <div class="alert alert-danger">
      <p>Исправьте ошибки ниже:</p>
      {{ form.non_field_errors }}
    </div>
{% endif %}

<form method="post">
  {% csrf_token %}

  {{ form.as_p }}

  <button type="submit">Добавить</button>
</form>
{% endblock %}
